# Backing services for integration tests. Start what you need, e.g.:
#   docker compose up -d redis qdrant
# then run integration suites with the matching env vars (see each package README):
#   REDIS_URL=redis://localhost:6379 \
#   QDRANT_URL=http://localhost:6333 \
#   PGVECTOR_URL=postgres://postgres:pw@localhost:5432/postgres \
#   CHROMA_URL=http://localhost:8000 \
#   WEAVIATE_HOST=localhost WEAVIATE_PORT=8080 WEAVIATE_GRPC=50051 \
#     pnpm turbo test
services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  qdrant:
    image: qdrant/qdrant
    ports:
      - '6333:6333'

  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: pw
    ports:
      - '5432:5432'

  chroma:
    image: chromadb/chroma
    ports:
      - '8000:8000'

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.0
    command: ['--host', '0.0.0.0', '--port', '8080', '--scheme', 'http']
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      QUERY_DEFAULTS_LIMIT: '25'
    ports:
      - '8080:8080'
      - '50051:50051'

  # Milvus needs etcd + minio + the standalone node; see
  # https://milvus.io/docs/install_standalone-docker-compose.md
  # Pinecone is a hosted service (no local container).
